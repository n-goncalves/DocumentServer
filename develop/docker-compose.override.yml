# Switches the NC container to the nextcloud-docker-dev image, enabling NC version switching.
#
# Each NC_BRANCH gets its own named volume, so switching between branches preserves
# each branch's installed state (eurooffice config, files, sessions, etc.).
#
# Usage:
#   docker compose up -d nextcloud                            (master/NC34 trunk, volume: nc_data_master)
#   NC_BRANCH=stable33 docker compose up -d nextcloud         (NC33,             volume: nc_data_stable33)
#   NC_BRANCH=stable34 docker compose up -d nextcloud         (once 34 is cut,   volume: nc_data_stable34)
#
# To switch branches: docker compose stop nextcloud && docker compose rm -f nextcloud && \
#                     NC_BRANCH=<branch> docker compose up -d nextcloud
#
# To wipe a single branch without touching the others:
#   docker compose rm -sfv nextcloud   (only removes the currently-attached volume)
# Or: docker volume rm develop_nc_data_<branch>

services:
  nextcloud:
    image: ghcr.io/juliusknorr/nextcloud-dev-php82:latest
    environment:
      SERVER_BRANCH: ${NC_BRANCH:-master}
      SQL: sqlite
    volumes:
      - nc_data_${NC_BRANCH:-master}:/var/www/html
      - ../../eurooffice-nextcloud:/var/www/html/apps-extra/eurooffice
      - ./setup/shared:/shared

volumes:
  nc_data_master:
  nc_data_stable33:
  nc_data_stable34:
