name: Update submodules to latest main branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily — after the mirror job (05:30 UTC)

jobs:
  update-submodules:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork repo (main)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "Euro-Office via GitHub Actions"
          git config user.email "actions@github.com"

      - name: Advance each submodule to latest main/master commit
        run: |
          set -euo pipefail

          # Map of submodule path → branch to track
          declare -A BRANCHES=(
            [server]="main"
            [web-apps]="main"
            [sdkjs]="main"
            [core]="main"
            [core-fonts]="main"
            [document-server-integration]="main"
            [dictionaries]="main"
            [document-templates]="main"
          )

          for path in "${!BRANCHES[@]}"; do
            branch="${BRANCHES[$path]}"
            if [ ! -d "$path" ]; then
              echo "Skipping $path — directory not found"
              continue
            fi
            echo "Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin
            git checkout "$branch"
            git reset --hard "origin/$branch"
            popd > /dev/null
          done

      - name: Open PR if submodule pointers changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          branch: chore/nightly-submodule-bump
          base: main
          delete-branch: true
          commit-message: "chore: update submodules to latest main branch"
          title: "chore: update submodules to latest main branch"
          body: |
            Automated nightly submodule bump.

            Updates each submodule to the latest commit on its tracking branch.
